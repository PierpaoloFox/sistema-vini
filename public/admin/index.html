<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Gestione Vini</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

  <!-- ── Login ──────────────────────────────────────────────────── -->
  <div id="schermata-login" class="login-wrap">
    <div class="login-box">
      <div class="login-logo">&#9770;</div>
      <h1>Gestione Vini</h1>
      <p>Inserisci la password per accedere</p>
      <form id="form-login" onsubmit="login(event)">
        <div class="campo">
          <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primario btn-full">Accedi</button>
      </form>
      <p id="errore-login" class="errore-login"></p>
    </div>
  </div>

  <!-- ── App ────────────────────────────────────────────────────── -->
  <div id="app" class="nascosto">

    <header class="admin-header">
      <div class="admin-header-inner">
        <div class="admin-logo"><span>&#9770;</span><span>Gestione Vini</span></div>
        <div class="admin-header-azioni">
          <a href="/" target="_blank" class="btn btn-outline">&#128065; Vedi catalogo</a>
          <button class="btn btn-ghost" onclick="logout()">Esci</button>
        </div>
      </div>
    </header>

    <main class="admin-main">
      <div class="admin-toolbar">
        <h2>Carta dei Vini <span id="contatore-vini" class="badge"></span></h2>
        <button class="btn btn-primario" onclick="apriFormNuovo()">+ Aggiungi vino</button>
      </div>

      <div class="ricerca-admin">
        <input type="text" id="ricerca-admin" placeholder="Cerca per nome, cantina..." oninput="filtraTabella(this.value)">
      </div>

      <div class="tabella-wrap">
        <table class="tabella-vini">
          <thead>
            <tr>
              <th>Tipo</th>
              <th>Cantina</th>
              <th>Nome</th>
              <th>Nazione</th>
              <th>Regione</th>
              <th>Annata</th>
              <th>Bottiglia</th>
              <th>Al calice</th>
              <th>Azioni</th>
            </tr>
          </thead>
          <tbody id="tbody-vini">
            <tr><td colspan="9" class="cella-loader">Caricamento...</td></tr>
          </tbody>
        </table>
      </div>
    </main>

  </div>

  <!-- ── Pannello form vino ──────────────────────────────────────── -->
  <div class="overlay-admin" id="overlay-admin" onclick="chiudiForm()"></div>
  <div class="pannello-form" id="pannello-form">
    <div class="pannello-header">
      <h3 id="titolo-form">Nuovo vino</h3>
      <button class="btn-chiudi-pannello" onclick="chiudiForm()">&#10005;</button>
    </div>

    <form id="form-vino" onsubmit="salvaVino(event)" class="form-vino">
      <input type="hidden" id="vino-id">

      <div class="form-griglia">

        <div class="campo campo-full">
          <label>Nome del vino *</label>
          <input type="text" id="f-nome" required placeholder="es. Barolo Riserva">
        </div>

        <div class="campo">
          <label>Cantina</label>
          <input type="text" id="f-cantina" placeholder="es. Gaja">
        </div>

        <div class="campo">
          <label>Tipo</label>
          <select id="f-tipo">
            <option value="">— seleziona —</option>
            <option value="Rosso">🔴 Rosso</option>
            <option value="Bianco">⚪ Bianco</option>
            <option value="Bollicine">🫧 Bollicine</option>
            <option value="Orange">🟠 Orange</option>
          </select>
        </div>

        <div class="campo">
          <label>Annata</label>
          <input type="number" id="f-annata" placeholder="es. 2019" min="1900" max="2099">
        </div>

        <div class="campo">
          <label>Uve / Vitigni</label>
          <input type="text" id="f-uve" placeholder="es. Nebbiolo 100%">
        </div>

        <div class="campo">
          <label>Prezzo bottiglia (€)</label>
          <input type="number" id="f-prezzo-bottiglia" placeholder="0.00" step="0.01" min="0">
        </div>

        <div class="campo">
          <label>Prezzo mescita / calice (€)</label>
          <input type="number" id="f-prezzo-mescita" placeholder="0.00" step="0.01" min="0">
        </div>

        <!-- Descrizione + AI -->
        <div class="campo campo-full">
          <div class="label-con-azione">
            <label>Descrizione</label>
            <button type="button" class="btn btn-ia" id="btn-genera" onclick="generaDescrizione()">
              ✦ Genera con AI (descrizione + origine)
            </button>
          </div>
          <textarea id="f-descrizione" rows="5" placeholder="Descrizione sensoriale del vino..."></textarea>
          <p id="stato-ia" class="stato-ia"></p>
        </div>

        <!-- Nazione e Regione: dopo la descrizione, auto-fill AI -->
        <div class="campo">
          <label>Nazione <span class="label-hint">auto-AI</span></label>
          <input type="text" id="f-nazione" placeholder="es. Italia">
        </div>

        <div class="campo">
          <label>Regione <span class="label-hint">auto-AI</span></label>
          <input type="text" id="f-regione" placeholder="es. Piemonte">
        </div>

        <!-- Foto bottiglia -->
        <div class="campo campo-full">
          <div class="label-con-azione">
            <label>Foto bottiglia</label>
            <button type="button" class="btn btn-cerca-foto" id="btn-cerca-foto" onclick="cercaImmagine()">
              &#128247; Cerca online
            </button>
          </div>
          <div class="foto-input-wrap">
            <input type="url" id="f-foto-url" placeholder="URL immagine (o usa Cerca online)">
            <div id="foto-preview-wrap" class="foto-preview-wrap nascosto">
              <img id="foto-preview" src="" alt="Anteprima" onerror="this.parentElement.classList.add('nascosto')">
            </div>
          </div>
          <p id="stato-foto" class="stato-ia"></p>
        </div>

      </div>

      <div class="form-footer">
        <button type="button" class="btn btn-ghost" onclick="chiudiForm()">Annulla</button>
        <button type="submit" class="btn btn-primario" id="btn-salva">Salva vino</button>
      </div>
    </form>
  </div>

  <!-- ── Conferma eliminazione ───────────────────────────────────── -->
  <div class="overlay-admin" id="overlay-elimina" onclick="annullaElimina()"></div>
  <div class="dialogo-conferma" id="dialogo-elimina">
    <h4>Eliminare questo vino?</h4>
    <p id="testo-elimina"></p>
    <div class="dialogo-azioni">
      <button class="btn btn-ghost" onclick="annullaElimina()">Annulla</button>
      <button class="btn btn-pericolo" onclick="confermaElimina()">Elimina</button>
    </div>
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
