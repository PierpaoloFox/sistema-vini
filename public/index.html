<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Carta dei Vini</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Intestazione -->
  <header>
    <div class="header-inner">
      <div class="logo-area">
        <img src="/locanda.png" alt="Locanda Tempesta" class="logo-img">
        <p class="sottotitolo">Selezione curata dal nostro sommelier Davide</p>
      </div>
      <div class="header-actions">
        <div class="lingua-wrap" id="lingua-wrap">
          <button class="lingua-btn" onclick="toggleLingue()" id="lingua-toggle">
            <span class="lingua-globo">&#127760;</span>
            <span class="lingua-etichetta" id="lingua-etichetta">IT</span>
            <span class="lingua-freccia">&#9660;</span>
          </button>
          <div class="lingua-menu" id="lingua-menu">
            <button onclick="cambiaLingua('it','Italiano')">🇮🇹 Italiano</button>
            <button onclick="cambiaLingua('en','English')">🇬🇧 English</button>
            <button onclick="cambiaLingua('de','Deutsch')">🇩🇪 Deutsch</button>
            <button onclick="cambiaLingua('fr','Français')">🇫🇷 Français</button>
            <button onclick="cambiaLingua('es','Español')">🇪🇸 Español</button>
            <button onclick="cambiaLingua('ja','日本語')">🇯🇵 日本語</button>
            <button onclick="cambiaLingua('zh-CN','中文')">🇨🇳 中文</button>
          </div>
        </div>
        <div id="google_translate_element" style="display:none"></div>
      </div>
    </div>
  </header>

  <!-- Macro-selezione categoria -->
  <nav class="categorie-bar">
    <button class="cat-btn attivo" data-categoria="Vino" onclick="setCategoria('Vino',this)">Vini</button>
    <button class="cat-btn" data-categoria="Birra" onclick="setCategoria('Birra',this)">Birre</button>
    <button class="cat-btn" data-categoria="Distillato" onclick="setCategoria('Distillato',this)">Distillati</button>
  </nav>

  <!-- Filtri nazioni -->
  <nav class="filtri-bar">
    <div class="filtri-scroll">
      <button class="filtro-btn attivo" data-filtro-nazione="tutti" onclick="resetFiltroNazione(this)">Tutti</button>
      <div id="filtri-nazioni" class="filtri-gruppo"></div>
    </div>
  </nav>

  <!-- Ricerca + toggle vista -->
  <div class="ricerca-bar">
    <div class="ricerca-inner">
      <input type="text" id="ricerca" placeholder="Cerca per nome, produttore..." autocomplete="off">
      <span class="ricerca-icon">&#128269;</span>
    </div>
    <div class="vista-toggle">
      <button id="btn-griglia" class="vista-btn" onclick="setVista('griglia')" title="Vista griglia">⊞</button>
      <button id="btn-lista"   class="vista-btn attivo" onclick="setVista('lista')"   title="Vista lista">☰</button>
    </div>
  </div>

  <!-- Lista vini -->
  <main id="catalogo" class="vista-griglia">
    <div class="loader" id="loader">
      <div class="loader-vite"></div>
      <p>Caricamento carta dei vini...</p>
    </div>
  </main>

  <!-- Modale dettaglio vino -->
  <div class="overlay" id="overlay" onclick="chiudiModale()"></div>
  <div class="modale" id="modale">
    <button class="modale-chiudi" onclick="chiudiModale()">&#10005;</button>
    <div class="modale-contenuto" id="modale-contenuto"></div>
  </div>

  <!-- Google Translate (widget nascosto, usiamo il selettore custom) -->
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'it',
        autoDisplay: false
      }, 'google_translate_element');
    }

    function toggleLingue() {
      const menu = document.getElementById('lingua-menu');
      menu.classList.toggle('aperto');
      document.getElementById('lingua-freccia');
    }

    function cambiaLingua(codice, etichetta) {
      document.getElementById('lingua-menu').classList.remove('aperto');
      document.getElementById('lingua-etichetta').textContent = etichetta.split(' ')[0].replace(/[^A-Za-zÀ-ÖØ-öø-ÿ　-鿿]/g, '') || etichetta;

      if (codice === 'it') {
        // Ripristina italiano: ricarica senza cookie GT
        const el = document.querySelector('.goog-te-combo');
        if (el) { el.value = 'it'; el.dispatchEvent(new Event('change')); }
        else {
          document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/';
          document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=' + location.hostname;
          location.reload();
        }
      } else {
        const el = document.querySelector('.goog-te-combo');
        if (el) { el.value = codice; el.dispatchEvent(new Event('change')); }
        else { setTimeout(() => cambiaLingua(codice, etichetta), 500); }
      }

      // Aggiorna etichetta nel bottone
      const map = { it:'IT', en:'EN', de:'DE', fr:'FR', es:'ES', ja:'日本', 'zh-CN':'中文' };
      document.getElementById('lingua-etichetta').textContent = map[codice] || codice.toUpperCase();
    }

    // Chiudi menu cliccando fuori
    document.addEventListener('click', e => {
      if (!document.getElementById('lingua-wrap').contains(e.target)) {
        document.getElementById('lingua-menu').classList.remove('aperto');
      }
    });
  </script>
  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  <script src="/js/app.js"></script>
</body>
</html>
